<script>
                    const topics = [
                        { id: '001', title: 'UNDERGROUND_VIBES_VOL_1', status: 'UNREAD', rating: 4 },
                        { id: '002', title: 'ENCRYPTED_SIGNAL_BETA', status: 'READ', rating: 5 },
                        { id: '003', title: 'VOID_CHANNEL_LOGS', status: 'UNREAD', rating: 3 },
                        { id: '004', title: 'MINT_CONDITION_DATA', status: 'READ', rating: 4 },
                        { id: '005', title: 'CRIMSON_NETWORK_ERROR', status: 'READ', rating: 2 },
                        { id: '006', title: 'GEEK_PUNK_MANIFESTO', status: 'UNREAD', rating: 5 },
                        { id: '007', title: 'SIGNAL_INTERFERENCE_09', status: 'READ', rating: 4 },
                        { id: '008', title: 'PROTOCOL_BREACH_LOGS', status: 'UNREAD', rating: 1 },
                    ];

                    document.addEventListener('DOMContentLoaded', () => {
                        const container = document.getElementById('accordion-container');
                        
                        // Generating 50 items by looping
                        for(let i = 0; i < 50; i++) {
                            const topic = topics[i % topics.length];
                            const item = document.createElement('div');
                            item.className = "border-b border-signal-crimson/30 overflow-hidden";
                            item.innerHTML = `
                                <button onclick="toggleAccordion(this)" class="w-full flex items-center justify-between p-3 bg-surface-container-low hover:bg-highlight-mint/10 transition-colors group">
                                    <div class="flex items-center gap-3">
                                        <span class="font-label-sm text-label-sm ${topic.status === 'UNREAD' ? 'text-signal-crimson font-bold' : 'text-on-surface-variant'}">${String(i + 1).padStart(3, '0')}</span>
                                        <span class="font-label-md text-label-md text-on-surface uppercase tracking-tight">${topic.title}_${i}</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        ${topic.status === 'UNREAD' ? '<span class="w-1.5 h-1.5 bg-signal-crimson rounded-full"></span>' : ''}
                                        <span class="material-symbols-outlined text-sm text-on-surface-variant transition-transform group-aria-expanded:rotate-180" data-icon="expand_more">expand_more</span>
                                    </div>
                                </button>
                                <div class="hidden p-4 bg-void-black border-l-3 border-highlight-mint space-y-3">
                                    <p class="font-label-sm text-label-sm text-on-surface-variant italic">DECRYPTED_CONTENT: High-frequency signal detected in Sector 7. Recommend immediate protocol update.</p>
                                    <div class="flex items-center justify-between">
                                        <div class="flex gap-1">
                                            ${Array(5).fill(0).map((_, idx) => `
                                                <button class="material-symbols-outlined text-lg ${idx < topic.rating ? 'text-highlight-mint' : 'text-surface-variant'}" style="font-variation-settings: 'FILL' ${idx < topic.rating ? 1 : 0}" data-icon="star">star</button>
                                            `).join('')}
                                        </div>
                                        <button class="px-4 py-1 border border-highlight-mint text-highlight-mint font-label-sm text-label-sm hover:bg-highlight-mint hover:text-void-black transition-colors uppercase">Execute_Link</button>
                                    </div>
                                </div>
                            `;
                            container.appendChild(item);
                        }
                    });

                    function toggleAccordion(btn) {
                        const content = btn.nextElementSibling;
                        const isHidden = content.classList.contains('hidden');
                        
                        // Close all others
                        document.querySelectorAll('#accordion-container > div > div').forEach(c => c.classList.add('hidden'));
                        document.querySelectorAll('#accordion-container button').forEach(b => b.setAttribute('aria-expanded', 'false'));

                        if (isHidden) {
                            content.classList.remove('hidden');
                            btn.setAttribute('aria-expanded', 'true');
                        }
                    }
                </script>

name: CI

"on":
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: playpipe_test
          MYSQL_USER: playpipe
          MYSQL_PASSWORD: playpipe
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_DATABASE: playpipe_test
      DB_USERNAME: playpipe
      DB_PASSWORD: playpipe
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array
      PLAYPIPE_ADMIN_ALLOWED_EMAILS: admin@example.test
      PLAYPIPE_ADMIN_DEV_LOGIN_ENABLED: false

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: bcmath, intl, pdo_mysql, zip, redis, dom, libxml
          coverage: none

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Prepare Laravel application
        run: |
          cp .env.example .env
          php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHPUnit
        run: php artisan test --display-deprecations --display-warnings

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G

      - name: Run PHP-CS-Fixer dry-run
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --verbose
